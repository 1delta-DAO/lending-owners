name: Fetch MORPHO_BLUE owners

on:
  schedule:
    # ~every 2 days (odd calendar days UTC); Morpho run is long
    - cron: "0 16 */2 * *"
  workflow_dispatch:

concurrency:
  group: fetch-morpho-blue
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create .env
        run: echo "MORPHO_BLUE_SUBGRAPH_API_KEY=${{ secrets.MORPHO_BLUE_SUBGRAPH_API_KEY }}" > .env

      - name: Fetch owners
        run: pnpm --filter @lending-owners/runner run start -- --lender MORPHO_BLUE

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/MORPHO_BLUE.json
          git diff --staged --quiet && echo "no changes" || (
            git commit -m "updating MORPHO_BLUE owners - $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin main
            git push
          )
