name: Fetch SPARK owners

on:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-spark
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create .env
        run: echo "SPARK_SUBGRAPH_API_KEY=${{ secrets.SPARK_SUBGRAPH_API_KEY }}" > .env

      - name: Fetch owners
        run: pnpm --filter @lending-owners/runner run start -- --lender SPARK

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/SPARK.json
          git diff --staged --quiet && echo "no changes" || (
            git commit -m "updating SPARK owners - $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin main
            git push
          )
